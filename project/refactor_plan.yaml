phase: 3
name: module_split
effort: high
risk: medium
estimated_days: 14-28

tasks:

  - id: H1
    priority: 1
    target: redsl/  # fan-out=19, fan-in=19, oznaczony !! split
    action: >
      Warstwa `redsl/` ma za odpowiedzialność zarówno analitycy, CLI,
      refaktory, API, jak i memory. Zgodnie z logiką layerów z analysis.toon.yaml
      wydzielić wyraźne podwarstwy:
        redsl/analyzers/   (już częściowo istnieje)
        redsl/commands/    (już istnieje)
        redsl/refactors/   (już istnieje)
        redsl/api/         (już istnieje jako routers?)
      Krok: zidentyfikować moduły bez przynależności (awareness/__init__,
      execution/decision) i przypisać je do właściwej warstwy.

  - id: H2
    priority: 2
    target: redsl/commands/batch_pyqual/
    action: >
      Już istnieje pod-pakiet — dodać wspólny `utils.py` (z zadań Q6)
      i upewnić się że `pipeline.py`, `runner.py`, `config_gen.py` nie
      importują się wzajemnie (sprawdzić cycles=0 snapshot).

  - id: H3
    priority: 3
    target: archive/legacy_scripts/
    action: >
      Zidentyfikowane duplikaty z archiwum vs produkcja (Q4, Q9):
      wyczyścić martwy kod. Archive nie powinno wchodzić do analizy —
      dodać do `.redup_ignore` lub przenieść poza zasięg skanowania.

