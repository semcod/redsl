phase: 4
name: dsl_reinforcement
effort: medium
risk: low
estimated_days: ongoing

tasks:

  - id: D1
    priority: 1
    description: fan_out_thresholds_in_config
    action: >
      Aktualne limity fan-out (10) są hard-coded w analizatorze.
      Wynieść do `redsl.yaml` per projekt:
        thresholds:
          fan_out: 10          # default
          fan_out_api: 20      # endpoints registration
          fan_out_example: 5   # example scripts
      Snapshoty project.toon.yaml będą uwzględniać per-project config.

  - id: D2
    priority: 2
    description: redup_rules_from_duplication_snapshot
    action: >
      Każdy duplikat z duplication.toon.yaml to potencjalna reguła DSL.
      Wzorzec wykrywania: `when: dup_group.sim >= 0.95 AND N >= 3 AND L >= 4`.
      Dodać do `config/default_rules.yaml` regułę `auto_extract_duplicate`
      z konfigurowalnym progiem sim, N, L.

  - id: D3
    priority: 3
    description: evolution_success_rate_tracking
    action: >
      Dodać do `project/evolution.toon.yaml` metryki jakości auto-fix:
        EVOLUTION:
          2026-04-19 CC̄=3.8 crit=54 35163L
            auto_fix_applied=? auto_fix_merged=? success_rate=?%
      Staje się to benchmarkiem vs MANTRA (82.8%).

  - id: D4
    priority: 4
    description: testql_as_patch_validator
    action: >
      Rozbudować testQL jako pre-check przed aplikacją patcha.
      Każde zadanie refaktoryzacji powinno mieć opcjonalny `testql_contract:`
      weryfikujący że semantyka się nie zmieniła (np. przez porównanie
      sygnatur funkcji przed i po).

