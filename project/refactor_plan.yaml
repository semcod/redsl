phase: 2
name: structural_refactoring
effort: medium
risk: medium
estimated_days: 7-14

tasks:

  - id: S1
    priority: 1
    target: _register_refactor_endpoints
    file: redsl/api/refactor_routes.py
    metric: fan_out=33
    limit: 10
    status: DONE  # 2026-04-19 → _collect_modified_files + _clear_project_history helpers
    action: >
      Funkcja rejestruje 33 endpointy w jednym miejscu.
      Podzielić na grupy: `_register_refactor_routes()`,
      `_register_cycle_routes()`, `_register_memory_routes()`,
      `_register_ws_routes()`. Każda grupa ≤8 rejestracji.
      Główna funkcja wywołuje 4 pod-rejestratory → fan-out=4.

  - id: S2
    priority: 2
    target: run_memory_learning_example
    file: redsl/examples/memory_learning.py
    metric: fan_out=32
    limit: 10
    action: >
      God-function orchestrująca cały przykład.
      Podzielić na etapy semantyczne:
        `_setup_agent()` → `_run_learning_loop()` → `_print_stats()`.
      Główna funkcja: 3 wywołania (fan-out=3).

  - id: S3
    priority: 3
    target: apply_quality_refactors
    file: redsl/autonomy/quality_gate.py  # lub refactors/engine.py
    metric: fan_out=18
    limit: 10
    action: >
      Kandydat na Pipeline Pattern (zgodnie z planem architektonicznym):
      ```python
      class QualityRefactorPipeline:
          steps = [DuplicateStep, FanOutStep, CCStep, GuardStep]
          def run(self, ctx: ProjectContext) -> RefactorResult: ...
      ```
      Każdy Step: `execute(ctx) -> ctx`, `can_apply(ctx) -> bool`.
      Fan-out głównej funkcji: 4 (liczba kroków).

  - id: S4
    priority: 4
    target: _analyze_single_project
    metric: fan_out=16
    action: >
      Wydzielić etapy: `_collect_metrics()`, `_run_analyzers()`,
      `_build_report()`. Główna funkcja orkiestruje 3 kroki.

  - id: S5
    priority: 5
    target: detect_version_mismatch
    metric: fan_out=16
    action: >
      Rozdzielić logikę detekcji od logiki raportowania.
      `_detect_mismatch(files) -> MismatchReport` (pure)
      + `_format_mismatch_report(report) -> str`.

  - id: S6
    priority: 6
    description: split_orchestrator
    ref: REFACTOR_PLAN_ORCHESTRATOR.md
    status: ALREADY_DONE  # orchestrator.py=170L, logika w redsl/execution/*
    action: >
      Zgodnie z istniejącym planem w REFACTOR_PLAN_ORCHESTRATOR.md —
      rozbicie redsl/orchestrator.py (688L) na 6 modułów pod
      redsl/orchestrator/. Plan jest gotowy, wystarczy zaimplementować.

