title: "ReDSL — Badge Generator"
description: >
  Generator badge'ów jakości kodu (A+ do F) z podglądem
  i gotowym kodem Markdown / HTML.

grade_scale:
  - grade: "A+"
    min_score: 95
    color: "#4c1"
    label: "excellent"
  - grade: "A"
    min_score: 85
    color: "#97CA00"
    label: "great"
  - grade: "B"
    min_score: 70
    color: "#dfb317"
    label: "good"
  - grade: "C"
    min_score: 55
    color: "#fe7d37"
    label: "fair"
  - grade: "D"
    min_score: 40
    color: "#e05d44"
    label: "poor"
  - grade: "F"
    min_score: 0
    color: "#c00"
    label: "critical"

badge_styles:
  - name: "flat"
    url_template: "https://img.shields.io/badge/{label}-{grade}-{color}?style=flat"
  - name: "flat-square"
    url_template: "https://img.shields.io/badge/{label}-{grade}-{color}?style=flat-square"
  - name: "for-the-badge"
    url_template: "https://img.shields.io/badge/{label}-{grade}-{color}?style=for-the-badge"

projects:
  - name: "payments-service"
    metrics:
      avg_cc: 6.3
      critical_count: 3
      duplicate_pct: 8.2
      security_issues: 2
      type_coverage_pct: 62
      total_lines: 8420

  - name: "auth-module"
    metrics:
      avg_cc: 3.1
      critical_count: 0
      duplicate_pct: 2.4
      security_issues: 0
      type_coverage_pct: 91
      total_lines: 2100

  - name: "legacy-monolith"
    metrics:
      avg_cc: 14.8
      critical_count: 22
      duplicate_pct: 19.6
      security_issues: 11
      type_coverage_pct: 18
      total_lines: 142000

scoring:
  weights:
    complexity: 0.30
    security: 0.25
    duplication: 0.20
    type_coverage: 0.15
    size: 0.10
  complexity_max_cc: 25.0
  security_max_issues: 10
  duplication_max_pct: 20.0
  size_max_lines: 50000
