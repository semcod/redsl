dimension_badges:
  - label: "complexity"
    key: "avg_cc"
    thresholds: {green: 5, yellow: 10, red: 20}
  - label: "security"
    key: "security_issues"
    thresholds: {green: 0, yellow: 3, red: 5}
  - label: "duplication"
    key: "duplicate_pct"
    thresholds: {green: 5, yellow: 10, red: 15}
  - label: "types"
    key: "type_coverage_pct"
    thresholds: {green: 80, yellow: 60, red: 40}

scoring:
  weights:
    complexity: 0.30
    security: 0.25
    duplication: 0.20
    type_coverage: 0.15
    size: 0.10
  complexity_max_cc: 25.0
  security_max_issues: 10
  duplication_max_pct: 20.0
  size_max_lines: 50000
