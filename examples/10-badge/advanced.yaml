title: "ReDSL — Badge Generator (advanced)"
description: >
  Rozszerzony generator badge'ów — wiele projektów w ekosystemie,
  badge'e per-wymiar, historia grade'ów, embed HTML.

grade_scale:
  - grade: "A+"
    min_score: 95
    color: "#4c1"
    label: "excellent"
  - grade: "A"
    min_score: 85
    color: "#97CA00"
    label: "great"
  - grade: "B"
    min_score: 70
    color: "#dfb317"
    label: "good"
  - grade: "C"
    min_score: 55
    color: "#fe7d37"
    label: "fair"
  - grade: "D"
    min_score: 40
    color: "#e05d44"
    label: "poor"
  - grade: "F"
    min_score: 0
    color: "#c00"
    label: "critical"

badge_styles:
  - name: "flat"
    url_template: "https://img.shields.io/badge/{label}-{grade}-{color}?style=flat"
  - name: "flat-square"
    url_template: "https://img.shields.io/badge/{label}-{grade}-{color}?style=flat-square"
  - name: "for-the-badge"
    url_template: "https://img.shields.io/badge/{label}-{grade}-{color}?style=for-the-badge"

projects:
  - name: "payments-service"
    metrics:
      avg_cc: 6.3
      critical_count: 3
      duplicate_pct: 8.2
      security_issues: 2
      type_coverage_pct: 62
      total_lines: 8420
    history:
      - date: "2026-01"
        grade: "D"
        score: 48
      - date: "2026-02"
        grade: "C"
        score: 61
      - date: "2026-03"
        grade: "B"
        score: 72
      - date: "2026-04"
        grade: "B"
        score: 74

  - name: "auth-module"
    metrics:
      avg_cc: 3.1
      critical_count: 0
      duplicate_pct: 2.4
      security_issues: 0
      type_coverage_pct: 91
      total_lines: 2100
    history:
      - date: "2026-01"
        grade: "A"
        score: 89
      - date: "2026-02"
        grade: "A"
        score: 91
      - date: "2026-03"
        grade: "A+"
        score: 95
      - date: "2026-04"
        grade: "A+"
        score: 96

  - name: "legacy-monolith"
    metrics:
      avg_cc: 14.8
      critical_count: 22
      duplicate_pct: 19.6
      security_issues: 11
      type_coverage_pct: 18
      total_lines: 142000
    history:
      - date: "2026-01"
        grade: "F"
        score: 12
      - date: "2026-02"
        grade: "F"
        score: 18
      - date: "2026-03"
        grade: "F"
        score: 22
      - date: "2026-04"
        grade: "D"
        score: 31

  - name: "api-gateway"
    metrics:
      avg_cc: 7.2
      critical_count: 1
      duplicate_pct: 5.1
      security_issues: 0
      type_coverage_pct: 78
      total_lines: 4800
    history:
      - date: "2026-04"
        grade: "A"
        score: 86

  - name: "notification-svc"
