    type: "refactor"
    title: "Uprość logikę retry"
    body: |
      ```python
      # Przed (CC=9):
      def retry_with_backoff(fn, max_retries=3):
          for attempt in range(max_retries):
              try:
                  result = fn()
                  if result.status == 'ok':
                      return result
                  elif result.status == 'retry':
                      time.sleep(2 ** attempt)
                  else:
                      raise PaymentError(result.error)
              except TimeoutError:
                  if attempt == max_retries - 1:
                      raise
                  time.sleep(2 ** attempt)

      # Po (CC=4) — ReDSL autofix:
      def retry_with_backoff(fn, max_retries=3):
          for attempt in range(max_retries):
              result = _attempt_call(fn, attempt, max_retries)
              if result is not None:
                  return result
          raise MaxRetriesExceeded(max_retries)
      ```

  - file: "payments/gateway.py"
    line: 45
    type: "dedup"
    title: "Usuń zduplikowany error handler"
    body: |
      ```python
      # Wydziel wspólny handler:
      def _handle_gateway_error(response, context):
          if response.status >= 500:
              logger.error("Gateway %s error: %s", context, response.body)
              raise GatewayUnavailable(context)
          if response.status >= 400:
              raise InvalidRequest(response.body)
      ```

