    def process_order(order, user, db, mailer, logger, inventory, pricing, tax, discount, shipping):
        """Funkcja z CC=25 i fan-out=10 — idealny kandydat do refaktoryzacji."""
        if not order:
            logger.error("No order")
            return None
        if not user:
            logger.error("No user")
            return None
        if order.status == "cancelled":
            logger.info("Order cancelled")
            return None
        if order.status == "completed":
            logger.info("Order already completed")
            return order

        items = order.items
        total = 0
        for item in items:
            if item.type == "physical":
                stock = inventory.check(item.sku)
                if stock <= 0:
                    logger.warning(f"Out of stock: {item.sku}")
                    if item.backorder_allowed:
                        inventory.backorder(item.sku, item.quantity)
                    else:
                        return {"error": f"Out of stock: {item.sku}"}
                price = pricing.get_price(item.sku)
                if discount.is_eligible(user, item):
                    price = discount.apply(price, user.tier)
                tax_amount = tax.calculate(price, user.region)
                total += price + tax_amount
            elif item.type == "digital":
                price = pricing.get_price(item.sku)
                total += price
            elif item.type == "subscription":
                price = pricing.get_subscription_price(item.sku, item.period)
                total += price
            else:
                logger.warning(f"Unknown item type: {item.type}")

        if total > 0:
            shipping_cost = shipping.calculate(order.address, items)
            total += shipping_cost
            order.total = total
            order.status = "processing"
            db.save(order)
            mailer.send_confirmation(user.email, order)
            logger.info(f"Order {order.id} processed: ${total}")
            return order
        else:
            logger.error("Empty order total")
            return None
  "orders/reconciliation.py": |
    def reconcile_invoice(invoice, ledger, tax_service, logger, notifier, audit, cache, pricing, region_service, payment_service):
        if not invoice:
            return None
        if invoice.status in {"archived", "void"}:
            return invoice
        if not ledger.exists(invoice.id):
            logger.error("Missing ledger entry")
            return None
        if invoice.total <= 0:
            logger.warning("Zero invoice total")
            return invoice
        if payment_service.is_failed(invoice.payment_id):
            notifier.alert_accounting(invoice.id)
            audit.record_failure(invoice.id)
            return None
        tax = tax_service.calculate(invoice.total, region_service.resolve(invoice.customer_id))
        cached_rate = cache.get(invoice.customer_id)
        price_adjustment = pricing.adjust(invoice.total, cached_rate)
        invoice.tax = tax
        invoice.adjustment = price_adjustment
        ledger.update(invoice.id, invoice)
        logger.info("Invoice reconciled")
        return invoice
